<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留言墙</title>
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
        body{background:#f0f4f8;padding:30px;}
        .container{max-width:700px;margin:0 auto;}
        h1{text-align:center;margin-bottom:30px;color:#222;}
        .login-box{background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 8px #ccc;margin:50px auto;max-width:400px;}
        .login-box input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:16px;}
        .login-box button{width:100%;padding:12px;background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        .wall-wrap{display:none;}
        .logout-btn{padding:8px 20px;background:#f56c6c;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-bottom:20px;}
        .admin-panel{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px #ccc;margin-bottom:20px;display:none;}
        .admin-panel input{padding:8px;margin:5px;border:1px solid #ddd;border-radius:4px;}
        .admin-panel button{padding:8px 12px;background:#67c23a;color:#fff;border:none;border-radius:4px;cursor:pointer;margin:5px;}
        .admin-del{background:#f56c6c !important;}
        .user-item{padding:10px;background:#f8f9fa;margin:6px 0;border-radius:4px;display:flex;justify-content:space-between;}
        .input-box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px #ccc;margin-bottom:20px;}
        textarea{width:100%;height:100px;padding:15px;border:1px solid #ddd;border-radius:6px;resize:none;font-size:16px;}
        .send-btn{margin-top:15px;padding:10px 30px;background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        .msg-item{background:#fff;padding:15px;border-radius:8px;margin-bottom:15px;box-shadow:0 1px 5px #ddd;}
        .msg-info{font-size:14px;color:#666;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:5px;}
        .msg-content{font-size:16px;margin-bottom:10px;}
        .del-msg-btn{padding:5px 10px;background:#f56c6c;color:#fff;border:none;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h1>留言墙</h1>
        <div class="login-box" id="loginBox">
            <input type="text" id="inpUser" placeholder="账号">
            <input type="password" id="inpPwd" placeholder="密码">
            <button onclick="login()">登录</button>
        </div>

        <div class="wall-wrap" id="wallBox">
            <button class="logout-btn" onclick="logout()">退出登录</button>
            <div class="admin-panel" id="adminPanel">
                <h3>管理员中心</h3>
                <input type="text" id="newU" placeholder="新增账号">
                <input type="password" id="newP" placeholder="密码">
                <button onclick="addUser()">添加账号</button>
                <br><br>
                <input type="text" id="editU" placeholder="修改账号">
                <input type="password" id="editP" placeholder="新密码">
                <button onclick="modifyPwd()">修改密码</button>
                <button onclick="delUser()" style="background:#f56c6c;">删除账号</button>
                <div id="userList" style="margin-top:15px;"></div>
            </div>

            <div class="input-box">
                <textarea id="content" placeholder="输入留言"></textarea>
                <button class="send-btn" onclick="postMsg()">发布留言</button>
            </div>
            <div id="msgList"></div>
        </div>
    </div>

    <script>
        let users = [];
        let msgs = [];
        let isAdmin = false;
        let loginName = "";

        window.onload = function(){
            loadUsers();
            loadMsgs();
        };

        // 加载用户（修复：只初始化一次，不覆盖）
        function loadUsers(){
            let data = localStorage.getItem("users");
            if(data){
                users = JSON.parse(data);
            }else{
                // 初始化管理员
                users = [{
                    user:"CBY",
                    pwd:md5("CBY888123"),
                    admin:true
                }];
                saveUsers();
            }
        }

        function saveUsers(){
            localStorage.setItem("users",JSON.stringify(users));
        }

        // ========== 登录（修复完成） ==========
        function login(){
            let u = document.getElementById("inpUser").value.trim();
            let p = document.getElementById("inpPwd").value.trim();
            let pmd5 = md5(p);

            for(let i=0;i<users.length;i++){
                if(users[i].user == u && users[i].pwd == pmd5){
                    isAdmin = users[i].admin;
                    loginName = u;
                    goHome();
                    return;
                }
            }
            alert("账号或密码错误！");
        }

        function goHome(){
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("wallBox").style.display = "block";
            if(isAdmin){
                document.getElementById("adminPanel").style.display = "block";
                showUserList();
            }else{
                document.getElementById("adminPanel").style.display = "none";
            }
            showMsgs();
        }

        function logout(){
            location.reload();
        }

        // ========== 管理员功能 ==========
        function addUser(){
            let u = document.getElementById("newU").value.trim();
            let p = document.getElementById("newP").value.trim();
            if(!u||!p){alert("不能为空");return;}
            for(let i=0;i<users.length;i++){
                if(users[i].user==u){alert("已存在");return;}
            }
            users.push({user:u,pwd:md5(p),admin:false});
            saveUsers();
            alert("添加成功");
            document.getElementById("newU").value="";
            document.getElementById("newP").value="";
            showUserList();
        }

        function modifyPwd(){
            let u = document.getElementById("editU").value.trim();
            let p = document.getElementById("editP").value.trim();
            for(let i=0;i<users.length;i++){
                if(users[i].user==u){
                    users[i].pwd=md5(p);
                    saveUsers();
                    alert("修改成功");
                    showUserList();
                    return;
                }
            }
            alert("账号不存在");
        }

        function delUser(){
            let u = document.getElementById("editU").value.trim();
            if(u=="CBY"){alert("不能删除管理员");return;}
            users=users.filter(item=>item.user!=u);
            saveUsers();
            alert("删除成功");
            showUserList();
        }

        function showUserList(){
            let html="";
            for(let i=0;i<users.length;i++){
                html+=`<div class="user-item">
                    ${users[i].user} ${users[i].admin?"[管理员]":""}
                </div>`;
            }
            document.getElementById("userList").innerHTML=html;
        }

        // ========== 留言 ==========
        function postMsg(){
            let c = document.getElementById("content").value.trim();
            if(!c)return;
            msgs.push({
                name:loginName,
                time:new Date().toLocaleString(),
                content:c
            });
            localStorage.setItem("msgs",JSON.stringify(msgs));
            showMsgs();
            document.getElementById("content").value="";
        }

        function loadMsgs(){
            let m=localStorage.getItem("msgs");
            if(m)msgs=JSON.parse(m);
        }

        function showMsgs(){
            let html="";
            for(let i=msgs.length-1;i>=0;i--){
                let del=isAdmin?`<button class="del-msg-btn" onclick="delMsg(${i})">删除</button>`:"";
                html+=`<div class="msg-item">
                    <div class="msg-info">${msgs[i].name} ${msgs[i].time}</div>
                    <div class="msg-content">${msgs[i].content}</div>
                    ${del}
                </div>`;
            }
            document.getElementById("msgList").innerHTML=html;
        }

        function delMsg(i){
            msgs.splice(i,1);
            localStorage.setItem("msgs",JSON.stringify(msgs));
            showMsgs();
        }
    </script>
</body>
</html>
